name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, deploy]

    env:
      BOT_DIR: /home/p_nsk/pnsk-lab-bot
    steps:
      - name: Deploy bot
        run: |
          export PATH="/home/p_nsk/.bun/bin:$PATH"
          cd $BOT_DIR
          git fetch origin
          git reset --hard origin/main
          bun install
          bun run build
          sudo systemctl restart pnsk-lab-bot
